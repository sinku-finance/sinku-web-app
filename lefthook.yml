pre-commit:
  parallel: true
  commands:
    format:
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: yarn biome:format {staged_files}
    lint:
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: yarn biome:lint {staged_files}
commit-msg:
  commands:
    "lint commit message":
      run: npx --no -- commitlint --edit "$1"